services:
  # ─────────────────────────────────────────────────────────────
  # Spring Boot API
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: gym-tracker-api
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /actuator/health

    envVars:
      # ── MySQL ────────────────────────────────────────────────
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://gym-tracker-db:3306/gymtracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

      - key: SPRING_DATASOURCE_USERNAME
        value: gymuser

      - key: SPRING_DATASOURCE_PASSWORD
        value: strongpassword

      # ── Redis ────────────────────────────────────────────────
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          name: gym-tracker-redis
          type: keyvalue
          property: connectionString

      - key: SPRING_DATA_REDIS_PORT
        fromService:
          name: gym-tracker-redis
          type: keyvalue
          property: connectionString

      - key: SPRING_DATA_REDIS_PASSWORD
        fromService:
          name: gym-tracker-redis
          type: keyvalue
          property: connectionString

      # ── JWT ──────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── JVM ──────────────────────────────────────────────────
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

  # ─────────────────────────────────────────────────────────────
  # MySQL Private Service
  # ─────────────────────────────────────────────────────────────
  - type: pserv
    name: gym-tracker-db
    runtime: image
    plan: starter

    image:
      url: mysql:8.0

    disk:
    ipAllowList: []