# =============================================================================
#  GYM TRACKER - Application Properties
#  All secrets are read from environment variables.
#  Local defaults (after the colon) let you run without setting anything.
# =============================================================================

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=gym-tracker

# ── DataSource (MySQL) ────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gymtracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Uday@778}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=GymTrackerHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "update" auto-creates/alters tables on startup — fine for dev/portfolio.
# Switch to "validate" + Flyway in a real production environment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Redis ─────────────────────────────────────────────────────────────────────
#spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
#spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
#spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000ms

# Lettuce connection pool (Lettuce is the default Redis client in Spring Boot)
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=2000ms

# ── Spring Cache (backed by Redis) ────────────────────────────────────────────
spring.cache.type=redis
# Default TTL = 10 minutes (in milliseconds). Overridden per-cache in RedisConfig.java
spring.cache.redis.time-to-live=600000

# ── JWT (Custom properties read by JwtTokenProvider) ─────────────────────────
#app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLXNlY3JldC1rZXktZm9yLWd5bS10cmFja2Vy}
app.jwt.expiration-ms=86400000
app.jwt.secret=${JWT_SECRET}

# ── Rate Limiting (read by RateLimitFilter) ───────────────────────────────────
app.rate-limit.requests-per-minute=60

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
# IMPORTANT: never expose stack traces or internal messages to clients
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── Actuator (health check used by Render) ────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.gymtracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
